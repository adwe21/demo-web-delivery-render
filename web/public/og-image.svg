<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title>Demo Launch Site</title>
  <desc>Product-style social preview card for Demo Launch Site highlighting proof-ready launch narrative, live intake, CI-guarded deploys, and share-ready branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="52%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.92" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="55%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1060" cy="120" r="170" fill="#38bdf8" opacity="0.14" filter="url(#softGlow)" />
  <circle cx="1080" cy="560" r="200" fill="#f59e0b" opacity="0.12" filter="url(#softGlow)" />
  <circle cx="170" cy="90" r="120" fill="#8b5cf6" opacity="0.1" filter="url(#softGlow)" />

  <rect x="44" y="44" width="1112" height="542" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="2" />
  <rect x="44" y="44" width="1112" height="542" rx="34" fill="url(#glow)" opacity="0.28" />

  <g transform="translate(92 86)">
    <rect x="0" y="0" width="260" height="48" rx="24" fill="#0f172a" stroke="#334155" />
    <circle cx="28" cy="24" r="7" fill="#22c55e" />
    <text x="48" y="31" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.6">DEMO LAUNCH SITE</text>

    <text x="0" y="100" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">
      Proof-ready launch narrative
    </text>
    <text x="0" y="162" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">
      for a real public handoff.
    </text>

    <text x="0" y="220" fill="#dbe4f0" font-family="Inter, Arial, sans-serif" font-size="27">
      Launch credibility, not just a landing page.
    </text>
    <text x="0" y="258" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="22">
      Live intake, smoke coverage, and share assets wired end to end.
    </text>

    <g transform="translate(0 308)">
      <rect x="0" y="0" width="214" height="92" rx="24" fill="#0b1220" stroke="#334155" />
      <text x="24" y="34" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">SPRINT</text>
      <text x="24" y="68" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">72h launch sprint</text>
      <text x="24" y="88" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="14">fast credible public handoff</text>

      <rect x="234" y="0" width="232" height="92" rx="24" fill="#0b1220" stroke="#334155" />
      <text x="258" y="34" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">CAPTURE</text>
      <text x="258" y="70" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">Live intake</text>
      <text x="258" y="88" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="16">contact path verified</text>

      <rect x="486" y="0" width="280" height="92" rx="24" fill="#0b1220" stroke="#334155" />
      <text x="510" y="34" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">DELIVERY</text>
      <text x="510" y="70" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">CI-guarded deploys</text>
      <text x="510" y="88" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="16">main → Actions → Zeabur</text>
    </g>

    <g transform="translate(0 430)">
      <rect x="0" y="0" width="766" height="58" rx="29" fill="#0b1220" stroke="#334155" />
      <rect x="10" y="10" width="176" height="38" rx="19" fill="url(#accent)" />
      <text x="24" y="35" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Share-ready branding</text>
      <text x="220" y="37" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22">demo-web-delivery.zeabur.app</text>
    </g>
  </g>

  <g transform="translate(892 118)">
    <rect x="0" y="0" width="218" height="118" rx="26" fill="#0b1220" stroke="#334155" />
    <text x="24" y="34" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">PUBLIC STATUS</text>
    <text x="24" y="76" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">ONLINE</text>
    <text x="24" y="100" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">root · health · intake OK</text>

    <rect x="0" y="138" width="218" height="128" rx="26" fill="#0b1220" stroke="#334155" />
    <text x="24" y="172" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">DELIVERY CHAIN</text>
    <text x="24" y="212" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">GitHub main</text>
    <text x="24" y="240" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="18">Actions smoke</text>
    <text x="24" y="262" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="18">Zeabur autodeploy</text>

    <rect x="0" y="286" width="218" height="116" rx="26" fill="#0b1220" stroke="#334155" />
    <text x="24" y="320" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">SHARE SURFACE</text>
    <text x="24" y="360" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">PNG + SVG</text>
    <text x="24" y="388" fill="#a7b4c6" font-family="Inter, Arial, sans-serif" font-size="16">metadata aligned for crawlers</text>
  </g>
</svg>
