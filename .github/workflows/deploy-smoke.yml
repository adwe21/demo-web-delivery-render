name: deploy-smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt pytest httpx

      - name: Install frontend deps
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run deploy smoke tests
        run: python -m pytest -q tests/web/test_demo_launch_backend.py tests/web/test_demo_launch_frontend_integration.py tests/web/test_demo_launch_deploy.py tests/web/test_deploy_container_contract.py tests/web/test_live_smoke.py

      - name: Run local live smoke check
        run: |
          python -m uvicorn web.backend.deploy_app:app --host 127.0.0.1 --port 8080 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(30):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8080/api/health", timeout=1):
                      break
              except Exception:
                  time.sleep(0.5)
          else:
              raise SystemExit("local uvicorn server did not become ready")
          PY
          if ! python scripts/live_smoke_check.py http://127.0.0.1:8080 >smoke-report.json 2>smoke-error.log; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
            import json
            from pathlib import Path

            payload = json.loads(Path("smoke-error.log").read_text())
            print("## smoke failure signal")
            print(f"- failure_class: `{payload.get('failure_class', 'unknown')}`")
            print(f"- detail: `{payload.get('detail', 'missing detail')}`")
            PY
            cat smoke-error.log >&2
            exit 1
          fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          payload = json.loads(Path("smoke-report.json").read_text())
          print("## smoke success signal")
          print(f"- root_status: `{payload['root_status']}`")
          print(f"- health_status: `{payload['health_status']}`")
          print(f"- submit_status: `{payload['submit_status']}`")
          print(f"- list_status: `{payload['list_status']}`")
          print(f"- metadata_checks: `{payload['metadata_checks']}`")
          PY
